<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/basics.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Charm:wght@400;700&family=Merienda:wght@300..900&family=Mitr:wght@200;300;400;500;600;700&family=Sriracha&display=swap" rel="stylesheet">
</head>
<body>
    <header class="css-header">
        <div class="css-website-name">
            WeatherApp
        </div>
        <div class="css-website-logo">
            <img src="../websiteLogo/Group 1.svg">
        </div>
    </header>
    <main>
        <div class="css-search">
            <input type="text" placeholder="Tehran">
            <button>
                <img src="../icons/search.svg">
            </button>
        </div>
        <div class="css-weather-stat">
            <p class="css-temperature">31&deg;C</p>
            <P class="css-city-name">Tehran</P>
            <time></time>
            <img src="../icons/cloud.svg">
            <p>Cloudy</p>
        </div>
    </main>
</body>
</html>
